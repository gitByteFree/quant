# 模型专用配置（覆盖 config.yaml 中的 model 段）
# 用于超参搜索和模型选择

model_selection:
  primary: lightgbm
  candidates: [lightgbm, tabnet, transformer]
  ensemble_method: stacking

lightgbm_search_space:
  n_estimators: [200, 500, 1000]
  learning_rate: [0.01, 0.05, 0.1]
  max_depth: [5, 6, 7, 8]
  num_leaves: [31, 64, 128, 255]
  subsample: [0.6, 0.8, 1.0]
  colsample_bytree: [0.6, 0.8, 1.0]
  reg_alpha: [0.0, 0.1, 0.5]
  reg_lambda: [0.0, 1.0, 5.0]

tabnet_search_space:
  n_d: [32, 64, 96]
  n_a: [32, 64, 96]
  n_steps: [3, 5, 7]
  gamma: [1.0, 1.5, 2.0]
  learning_rate: [0.001, 0.005, 0.01]

transformer_search_space:
  d_model: [64, 128, 256]
  n_heads: [4, 8]
  n_layers: [2, 3, 4]
  dropout: [0.1, 0.2, 0.3]
  learning_rate: [0.0001, 0.001, 0.005]
  seq_len: [20, 40, 60]

feature_selection:
  method: importance  # importance | shap | tabnet_mask
  top_k_features: 50
  min_importance_threshold: 0.01

loss_function:
  type: ic_weighted_mse  # mse | ic_weighted_mse | lambdarank
  ic_weight_alpha: 1.0
  rank_sigma: 1.0
